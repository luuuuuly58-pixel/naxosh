<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گفتوگۆ — نەخۆش</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="chat">
  <header id="site-header"></header>

  <div class="container">
    <div class="chat-shell">
      <div class="chat-header" id="chat-doctor"></div>
      <div id="chat-box"></div>
      <form class="chat-form" id="chat-form">
        <input type="text" id="chat-input" placeholder="نامەکەت بنووسە..." autocomplete="off">
        <button type="submit" class="btn btn-primary">ناردن</button>
      </form>
    </div>
  </div>

  <footer id="site-footer"></footer>

  <!-- Firebase (کۆگای هاوبەش) — ئەگەر کلیلەکان دانەنرابن، هیچ کاریگەری نییە -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/firebase.js"></script>
</body>
</html>
